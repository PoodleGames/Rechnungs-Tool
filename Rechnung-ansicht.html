<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rechnung — Ansicht</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: #c8cfd6; font-family: 'Segoe UI', Arial, sans-serif; }

  .toolbar {
    position: fixed; bottom: 26px; right: 26px;
    display: flex; gap: 10px; align-items: center; z-index: 100;
  }
  .toolbar button, .toolbar a {
    border: none; border-radius: 8px; padding: 10px 20px; font-size: 10pt;
    font-weight: 600; cursor: pointer; display: flex; align-items: center;
    gap: 8px; text-decoration: none; font-family: inherit;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-nav  { background: #fff; color: #555; border: 1.5px solid #ccc; box-shadow: 0 3px 14px rgba(0,0,0,0.08); }
  .btn-nav:hover { background: #f5f5f5; }
  .btn-xml  { background: #fff; color: #1a4f82; border: 1.5px solid #1a4f82; box-shadow: 0 3px 14px rgba(26,79,130,0.15); }
  .btn-xml:hover { background: #eef3f9; transform: translateY(-1px); }
  .btn-pdf  { background: #1a4f82; color: #fff; box-shadow: 0 3px 14px rgba(26,79,130,0.38); }
  .btn-pdf:hover { background: #15406e; transform: translateY(-1px); }
  .btn-cancelled { background: #fee2e2; color: #991b1b; border: 1.5px solid #fca5a5; }
  svg { width: 15px; height: 15px; flex-shrink: 0; }

  .cancelled-bar {
    position: fixed; top: 0; left: 0; right: 0;
    background: #991b1b; color: #fff; text-align: center;
    padding: 8px; font-size: 10pt; font-weight: 700; z-index: 200;
    display: none;
  }

  #invoiceFrame {
    display: block;
    width: 100%;
    height: 100vh;
    border: none;
    padding-top: 0;
  }

  .toast {
    position: fixed; bottom: 90px; right: 26px; background: #1a2a3a; color: #fff;
    padding: 10px 16px; border-radius: 7px; font-size: 9pt; z-index: 300;
    box-shadow: 0 4px 18px rgba(0,0,0,0.3); opacity: 0; transform: translateY(8px);
    transition: opacity .2s, transform .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  @media print { .toolbar, .cancelled-bar, .toast { display: none !important; } }
</style>
</head>
<body>

<div class="cancelled-bar" id="cancelledBar"></div>

<iframe id="invoiceFrame" title="Rechnung"></iframe>

<div class="toolbar">
  <a class="btn-nav" href="Rechnungen.html">← Zur Historie</a>
  <button class="btn-xml" id="btnXml" onclick="exportXml()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M9 13l2 2 4-4"/></svg>
    Als XML exportieren
  </button>
  <button class="btn-pdf" onclick="document.getElementById('invoiceFrame').contentWindow.print()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V2h12v7"/><rect x="2" y="9" width="20" height="9" rx="2"/><path d="M6 18v4h12v-4"/><circle cx="17.5" cy="13.5" r="1" fill="currentColor" stroke="none"/></svg>
    Als PDF exportieren
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="js/filestore.js"></script>
<script src="js/common.js"></script>
<script src="js/invoice-view.js"></script>
</body>
</html>
